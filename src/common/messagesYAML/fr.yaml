  docUri: https://github.com/vrtmrz/obsidian-livesync/blob/main/README.md#how-to-use
  fix0256:
    buttons:
      checkItLater: Vérifier plus tard
      DismissForever: J'ai corrigé, et ne plus demander
      fix: Corriger
    message: >
      En raison d'un bug récent (en v0.25.6), certains fichiers peuvent ne pas
      avoir été enregistrés correctement dans la base de synchronisation.

      Nous avons analysé vos fichiers et trouvé ceux à corriger.


      **Fichiers prêts à être corrigés :**


      ${files}


      Ces fichiers ont un original de taille correspondante sur le stockage,
      et sont probablement récupérables.

      Nous pouvons les utiliser pour corriger la base, veuillez cliquer sur
      le bouton « Corriger » ci-dessous pour les réparer.


      ${messageUnrecoverable}


      Si vous voulez relancer l'opération, vous pouvez le faire depuis Hatch.
    messageUnrecoverable: >
      **Fichiers non réparables sur cet appareil :**


      ${filesNotRecoverable}


      Ces fichiers ont des métadonnées incohérentes et ne peuvent être
      corrigés sur cet appareil (le plus souvent, nous ne pouvons déterminer
      lequel est correct).

      Pour les restaurer, vérifiez vos autres appareils (par cette même
      fonction) ou restaurez-les manuellement depuis une sauvegarde.
    title: Fichiers corrompus détectés
  insecureChunkExist:
    buttons:
      fetch: J'ai déjà reconstruit le distant. Récupérer depuis le distant
      later: Je le ferai plus tard
      rebuild: Tout reconstruire
    laterMessage: Nous recommandons fortement de traiter ceci dès que possible !
    message: >
      Certains fragments ne sont pas stockés de façon sécurisée et ne sont pas
      chiffrés dans les bases.

      **Veuillez reconstruire la base pour corriger ce problème.**


      Si votre base distante n'est pas configurée avec SSL, ou utilise des
      identifiants peu sûrs, **vous risquez d'exposer des données sensibles**.


      Note : Veuillez mettre à jour Self-hosted LiveSync en v0.25.6 ou
      supérieur sur tous vos appareils, et sauvegardez votre coffre avec soin.

      Note 2 : Tout reconstruire et Récupérer consomme un peu de temps et de
      bande passante, veuillez le faire hors des heures de pointe et avec une
      connexion réseau stable.
