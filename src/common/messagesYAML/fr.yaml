  msgFetchRemoteAgain: >-
    Comme vous le savez peut-être déjà, Self-hosted LiveSync a modifié son
    comportement par défaut et la structure de sa base de données.


    Et, grâce à votre temps et vos efforts, la base distante semble déjà
    avoir été migrée. Félicitations !


    Cependant, il faut encore un peu plus. La configuration de cet appareil
    n'est pas compatible avec la base distante. Nous devrons récupérer à
    nouveau la base distante. Devons-nous récupérer depuis le distant
    maintenant ?


    ___Note : Nous ne pouvons pas synchroniser tant que la configuration n'a
    pas été modifiée et que la base n'a pas été récupérée à nouveau.___

    ___Note 2 : Les fragments sont complètement immuables, nous ne pouvons
    récupérer que les métadonnées et les différences.___
  msgInitialSetup: >-
    Votre appareil n'a **pas encore été configuré**. Laissez-moi vous guider
    dans le processus de configuration.


    Veuillez noter que chaque contenu de boîte de dialogue peut être copié
    dans le presse-papiers. Si vous souhaitez vous y référer plus tard, vous
    pouvez le coller dans une note d'Obsidian. Vous pouvez également le
    traduire dans votre langue via un outil de traduction.


    Tout d'abord, disposez-vous d'une **URI de configuration** ?


    Note : Si vous ne savez pas ce que c'est, consultez la
    [documentation](${URI_DOC}).
  msgRecommendSetupUri: >-
    Nous recommandons vivement de générer une URI de configuration et de
    l'utiliser.

    Si vous ne connaissez pas, veuillez consulter la
    [documentation](${URI_DOC}) (Désolé encore, mais c'est important).


    Comment souhaitez-vous effectuer la configuration manuellement ?
  msgSinceV02321: >-
    Depuis la v0.23.21, Self-hosted LiveSync a modifié son comportement par
    défaut et la structure de sa base. Les changements suivants ont été
    effectués :


    1. **Sensibilité à la casse des noms de fichiers**
       La gestion des noms de fichiers est désormais insensible à la casse. C'est un changement bénéfique pour la plupart des plateformes, hormis Linux et iOS, qui ne gèrent pas efficacement la casse des noms de fichiers.
       (Sur celles-ci, un avertissement s'affichera pour les fichiers portant le même nom avec une casse différente).

    2. **Gestion des révisions des fragments**
       Les fragments sont immuables, ce qui permet de fixer leurs révisions. Ce changement améliore les performances d'enregistrement des fichiers.

    ___Cependant, pour activer l'un ou l'autre de ces changements, les bases
    locale et distante doivent être reconstruites. Ce processus prend quelques
    minutes, et nous recommandons de le faire quand vous avez le temps.___


    - Si vous souhaitez conserver le comportement précédent, vous pouvez
    ignorer ce processus via `${KEEP}`.

    - Si vous n'avez pas le temps, choisissez `${DISMISS}`. Vous serez invité
    à nouveau plus tard.

    - Si vous avez reconstruit la base sur un autre appareil, sélectionnez
    `${DISMISS}` et réessayez la synchronisation. Une différence étant
    détectée, vous serez invité à nouveau.
