  Message:
    Main: >-

      Les paramètres de la base distante sont les suivants. Ces valeurs sont
      configurées par d'autres appareils, synchronisés au moins une fois avec
      celui-ci.


      Pour utiliser ces paramètres, sélectionnez
      %{TweakMismatchResolve.Action.UseConfigured}.

      Pour conserver les paramètres de cet appareil, sélectionnez
      %{TweakMismatchResolve.Action.Dismiss}.


      ${table}


      >[!ASTUCE]

      > Pour synchroniser tous les paramètres, utilisez « Synchroniser les
      paramètres via markdown » après application de la configuration
      minimale avec cette fonctionnalité.


      ${additionalMessage}
    MainTweakResolving: |-
      Votre configuration ne correspond pas à celle du serveur distant.

      La configuration suivante devrait correspondre :

      ${table}

      Faites-nous part de votre décision.

      ${additionalMessage}
    UseRemote:
      WarningRebuildRecommended: >-

        >[!AVIS]

        > Certains changements sont compatibles mais peuvent consommer du
        stockage et du trafic supplémentaires. Une reconstruction est
        recommandée. Cependant, elle peut ne pas être effectuée maintenant,
        mais pourra l'être lors d'une maintenance future.

        > ***Assurez-vous d'avoir du temps et une connexion stable pour
        appliquer !***
      WarningRebuildRequired: >-

        >[!AVERTISSEMENT]

        > Certaines configurations distantes ne sont pas compatibles avec la
        base locale de cet appareil. Une reconstruction de la base locale
        sera requise.

        > ***Assurez-vous d'avoir du temps et une connexion stable pour
        appliquer !***
    WarningIncompatibleRebuildRecommended: >-

      >[!AVIS]

      > Nous avons détecté que certaines valeurs diffèrent et rendent la base
      locale incompatible avec la base distante.

      > Certains changements sont compatibles mais peuvent consommer du
      stockage et du trafic supplémentaires. Une reconstruction est
      recommandée. Cependant, elle peut ne pas être effectuée maintenant, mais
      pourra l'être lors d'une maintenance future.

      > Si vous souhaitez reconstruire, cela prend quelques minutes ou plus.
      **Assurez-vous qu'il est sûr de le faire maintenant.**
    WarningIncompatibleRebuildRequired: >-

