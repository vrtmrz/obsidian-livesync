  Note:
    description: >2-
       Ce réplicateur permet de synchroniser notre coffre avec d'autres
      appareils via une connexion pair-à-pair. Nous pouvons l'utiliser pour
      synchroniser notre coffre avec nos autres appareils sans recourir à un
      service cloud.

      Ce réplicateur est basé sur Trystero. Il utilise également un serveur de
      signalisation pour établir une connexion entre les appareils. Le serveur
      de signalisation sert à échanger les informations de connexion entre
      appareils. Il ne connaît (ou ne devrait connaître) ni ne stocke aucune
      de nos données.


      Le serveur de signalisation peut être hébergé par n'importe qui. Il
      s'agit simplement d'un relais Nostr. Par souci de simplicité et pour
      vérifier le comportement du réplicateur, une instance du serveur de
      signalisation est hébergée par vrtmrz. Vous pouvez utiliser le serveur
      expérimental fourni par vrtmrz, ou tout autre serveur.


      Au passage, même si le serveur de signalisation ne stocke pas nos
      données, il peut voir les informations de connexion de certains de nos
      appareils. Soyez-en conscient. Soyez également prudent avec un serveur
      fourni par quelqu'un d'autre.
