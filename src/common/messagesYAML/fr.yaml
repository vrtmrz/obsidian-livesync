Replicator:
  Dialogue:
    Locked:
      Action:
        Dismiss: Annuler pour reconfirmer
        Fetch: Réinitialiser la synchronisation sur cet appareil
        Unlock: Déverrouiller la base distante
      Message:
        _value: >
          La base distante est verrouillée. Ceci est dû à une reconstruction
          sur l'un des terminaux.

          L'appareil est donc prié de suspendre la connexion pour éviter la
          corruption de la base.


          Trois options sont possibles :


          - %{Replicator.Dialogue.Locked.Action.Fetch}
            La méthode la plus recommandée et fiable. Elle supprime la base locale puis réinitialise toutes les informations de synchronisation depuis la base distante. Dans la plupart des cas, c'est sûr. Cela prend cependant du temps et devrait se faire sur un réseau stable.
          - %{Replicator.Dialogue.Locked.Action.Unlock}
            Cette méthode ne peut être utilisée que si nous sommes déjà synchronisés de manière fiable par d'autres méthodes de réplication. Cela ne signifie pas simplement que nous avons les mêmes fichiers. Dans le doute, évitez.
          - %{Replicator.Dialogue.Locked.Action.Dismiss}
              Ceci annule l'opération. Vous serez à nouveau interrogé à la prochaine requête.
        Fetch: Tout récupérer a été planifié. Le plug-in sera redémarré pour l'exécuter.
        Unlocked: La base distante a été déverrouillée. Veuillez réessayer l'opération.
      Title: Verrouillée
