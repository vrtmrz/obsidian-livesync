RedFlag:
  Fetch:
    Method:
      Desc: >-
        Comment voulez-vous récupérer ?

        - %{RedFlag.Fetch.Method.FetchSafer}.
          **Trafic faible**, **CPU élevé**, **Risque faible**
          Recommandé si ...
          - Fichiers possiblement incohérents
          - Fichiers peu nombreux
        - %{RedFlag.Fetch.Method.FetchSmoother}.
          **Trafic faible**, **CPU modéré**, **Risque faible à modéré**
          Recommandé si ...
          - Fichiers probablement cohérents
          - Vous avez beaucoup de fichiers.
        - %{RedFlag.Fetch.Method.FetchTraditional}.
          **Trafic élevé**, **CPU faible**, **Risque faible à modéré**

        >[!INFO]- Détails

        > ## %{RedFlag.Fetch.Method.FetchSafer}.

        > **Trafic faible**, **CPU élevé**, **Risque faible**

        > Cette option crée d'abord une base locale à partir des fichiers
        locaux existants avant de récupérer les données depuis la source
        distante.

        > Si des fichiers correspondants existent à la fois localement et à
        distance, seules les différences entre eux seront transférées.

        > Toutefois, les fichiers présents aux deux emplacements seront
        initialement traités comme en conflit. Ils seront résolus
        automatiquement s'ils ne le sont pas réellement, mais ce processus
        peut prendre du temps.

        > C'est généralement la méthode la plus sûre, minimisant le risque de
        perte de données.

        > ## %{RedFlag.Fetch.Method.FetchSmoother}.

        > **Trafic faible**, **CPU modéré**, **Risque faible à modéré**
        (selon l'opération)

        > Cette option crée d'abord des fragments à partir des fichiers locaux
        pour la base, puis récupère les données. Par conséquent, seuls les
        fragments manquants localement sont transférés. Cependant, toutes les
        métadonnées sont prises de la source distante.

        > Les fichiers locaux sont ensuite comparés à ces métadonnées au
        lancement. Le contenu considéré comme plus récent écrasera le plus
        ancien (selon la date de modification). Le résultat est ensuite
        synchronisé vers la base distante.

        > C'est généralement sûr si les fichiers locaux ont bien l'horodatage
        le plus récent. Cela peut toutefois poser problème si un fichier a un
        horodatage plus récent mais un contenu plus ancien (comme le
        `welcome.md` initial).

        > Cette méthode utilise moins de CPU et est plus rapide que
        « %{RedFlag.Fetch.Method.FetchSafer} », mais peut entraîner une perte
        de données si elle n'est pas utilisée avec précaution.

        > ## %{RedFlag.Fetch.Method.FetchTraditional}.

        > **Trafic élevé**, **CPU faible**, **Risque faible à modéré**
        (selon l'opération)

        > Tout sera récupéré depuis le distant.

        > Similaire à %{RedFlag.Fetch.Method.FetchSmoother}, mais tous les
        fragments sont récupérés depuis la source distante.

        > C'est la façon la plus traditionnelle de récupérer, consommant
        généralement le plus de trafic réseau et de temps. Elle comporte
        également un risque similaire d'écraser les fichiers distants à
        l'option « %{RedFlag.Fetch.Method.FetchSmoother} ».

        > Elle est toutefois souvent considérée comme la méthode la plus
        stable car c'est la plus ancienne et la plus directe.
      FetchSafer: Créer une base locale avant de récupérer
      FetchSmoother: Créer des fragments de fichiers locaux avant de récupérer
      FetchTraditional: Tout récupérer depuis le distant
      Title: Comment voulez-vous récupérer ?
