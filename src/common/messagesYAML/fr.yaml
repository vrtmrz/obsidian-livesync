Setting:
  GenerateKeyPair:
    Desc: >+
      Nous avons généré une paire de clés !


      Note : cette paire de clés ne sera plus jamais affichée. Veuillez la
      conserver dans un endroit sûr. Si vous la perdez, vous devrez générer
      une nouvelle paire.

      Note 2 : la clé publique est au format spki, et la clé privée au format
      pkcs8. Pour plus de commodité, les retours à la ligne sont convertis en
      `\n` dans la clé publique.

      Note 3 : la clé publique doit être configurée dans la base distante, et
      la clé privée sur les appareils locaux.


      >[!POUR VOS YEUX SEULEMENT]-

      > <div class="sls-keypair">

      >

      > ### Clé publique

      > ```

      ${public_key}

      > ```

      >

      > ### Clé privée

      > ```

      ${private_key}

      > ```

      >

      > </div>


      >[!Les deux pour copier]-

      >

      > <div class="sls-keypair">

      >

      > ```

      ${public_key}

      ${private_key}

      > ```

      >

      > </div>

    Title: Une nouvelle paire de clés a été générée !
  TroubleShooting:
    _value: Dépannage
    Doctor:
      _value: Docteur des paramètres
      Desc: Détecte les paramètres non optimaux. (Identique à la migration)
    ScanBrokenFiles:
      _value: Analyser les fichiers corrompus
      Desc: Analyse les fichiers qui ne sont pas stockés correctement dans la base.
SettingTab:
  Message:
    AskRebuild: Vos modifications nécessitent une récupération depuis la base distante. Voulez-vous continuer ?
Setup:
  Apply:
    Buttons:
      ApplyAndFetch: Appliquer et récupérer
      ApplyAndMerge: Appliquer et fusionner
      ApplyAndRebuild: Appliquer et reconstruire
      Cancel: Abandonner et annuler
      OnlyApply: Appliquer seulement
    Message: >-
      La nouvelle configuration est prête. Procédons à son application.

      Plusieurs manières de l'appliquer :


      - Appliquer et récupérer
        Configurer cet appareil comme nouveau client. Après application, synchroniser depuis le serveur distant.
      - Appliquer et fusionner
        Configurer sur un appareil qui possède déjà les fichiers. Traite les fichiers locaux et transfère les différences. Des conflits peuvent apparaître.
      - Appliquer et reconstruire
        Reconstruire le distant à partir des fichiers locaux. Typiquement effectué si le serveur est corrompu ou si l'on souhaite repartir de zéro.
        Les autres appareils seront verrouillés et devront refaire une récupération.
      - Appliquer seulement
        Appliquer uniquement. Des conflits peuvent apparaître si une reconstruction est nécessaire.
    Title: Appliquer la nouvelle configuration depuis ${method}
    WarningRebuildRecommended: "NOTE : après ajustement des paramètres, il a été
      déterminé qu'une reconstruction est requise ; un simple import n'est pas
      recommandé."
  Doctor:
    Buttons:
      No: Non, utiliser les paramètres de l'URI tels quels
      Yes: Oui, consulter le docteur
    Message: >-
      Self-hosted LiveSync s'est progressivement étoffé et certains paramètres
      recommandés ont évolué.


      La configuration est un bon moment pour le faire.


      Voulez-vous lancer le Docteur pour vérifier si les paramètres importés
      sont optimaux par rapport au dernier état ?
    Title: Voulez-vous consulter le docteur ?
  FetchRemoteConf:
    Buttons:
      Fetch: Oui, récupérer la configuration
      Skip: Non, utiliser les paramètres de l'URI
    Message: >-
      Si nous avons déjà synchronisé une fois avec un autre appareil, la base
      distante stocke les valeurs de configuration adaptées entre les
      appareils synchronisés. Le plug-in souhaiterait les récupérer pour une
      configuration robuste.


      Mais il faut s'assurer d'une chose. Sommes-nous actuellement dans une
      situation où nous pouvons accéder au réseau en toute sécurité et
      récupérer les paramètres ?


      Note : le plus souvent, c'est sûr si votre base distante est hébergée
      avec un certificat SSL et si votre réseau n'est pas compromis.
    Title: Récupérer la configuration depuis la base distante ?
  QRCode: >-
    Nous avons généré un QR code pour transférer les paramètres. Scannez-le
    avec votre téléphone ou un autre appareil.

    Note : le QR code n'est pas chiffré, soyez prudent en l'affichant.


    >[!POUR VOS YEUX SEULEMENT]-

    > <div class="sls-qr">${qr_image}</div>
  ShowQRCode:
    _value: Afficher le QR code
    Desc: Afficher le QR code pour transférer les paramètres.
