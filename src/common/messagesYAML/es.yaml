  ScanQRCode:
    Title: Escanear código QR
    Guidance: Sigue los pasos de abajo para importar los ajustes desde tu dispositivo actual.
    Step1: En este dispositivo, mantén este Vault abierto.
    Step2: En el dispositivo de origen, abre Obsidian.
    Step3: En el dispositivo de origen, ejecuta desde la paleta de comandos la orden "Mostrar ajustes como código QR".
    Step4: En este dispositivo, cambia a la cámara o usa un escáner QR para escanear el código mostrado.
