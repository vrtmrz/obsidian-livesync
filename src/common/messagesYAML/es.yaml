  msgRebuildRequired: >-
    Es necesario reconstruir las bases de datos para aplicar los cambios. Por
    favor selecciona el método para aplicar los cambios.


    <details>

    <summary>Legendas</summary>


    | Símbolo | Significado |

    |: ------ :| ------- |

    | ⇔ | Actualizado |

    | ⇄ | Sincronizar para equilibrar |

    | ⇐,⇒ | Transferir para sobrescribir |

    | ⇠,⇢ | Transferir para sobrescribir desde otro lado |


    </details>


    ## ${OPTION_REBUILD_BOTH}

    A simple vista:  📄 ⇒¹ 💻 ⇒² 🛰️ ⇢ⁿ 💻 ⇄ⁿ⁺¹ 📄

    Reconstruir tanto la base de datos local como la remota utilizando los
    archivos existentes de este dispositivo.

    Esto bloquea a otros dispositivos, y necesitan realizar la obtención.

    ## ${OPTION_FETCH}

    A simple vista: 📄 ⇄² 💻 ⇐¹ 🛰️ ⇔ 💻 ⇔ 📄

    Inicializa la base de datos local y la reconstruye utilizando los datos
    obtenidos de la base de datos remota.

    Este caso incluye el caso en el que has reconstruido la base de datos
    remota.

    ## ${OPTION_ONLY_SETTING}

    Almacena solo la configuración. **Precaución: esto puede provocar corrupción
    de datos**; generalmente es necesario reconstruir la base de datos.
