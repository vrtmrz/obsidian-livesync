Setting:
  GenerateKeyPair:
    Desc: >-
      Hemos generado un par de claves.


      Nota: Este par de claves no volverá a mostrarse. Guárdalo en un lugar
      seguro. Si lo pierdes, tendrás que generar uno nuevo.

      Nota 2: La clave pública está en formato spki y la clave privada en
      formato pkcs8. Para mayor comodidad, los saltos de línea de la clave
      pública se convierten en `\n`.

      Nota 3: La clave pública debe configurarse en la base de datos remota y la
      clave privada en los dispositivos locales.


      >[!SOLO PARA TUS OJOS]-

      > <div class="sls-keypair">

      >

      > ### Clave pública

      > ```

      ${public_key}

      > ```

      >

      > ### Clave privada

      > ```

      ${private_key}

      > ```

      >

      > </div>


      >[!Ambas para copiar]-

      >

      > <div class="sls-keypair">

      >

      > ```

      ${public_key}

      ${private_key}

      > ```

      >

      > </div>
    Title: ¡Se ha generado un nuevo par de claves!
