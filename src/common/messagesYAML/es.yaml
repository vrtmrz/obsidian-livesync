  msgObjectStorageWarning: >-
    ADVERTENCIA: Esta característica está en desarrollo, así que por favor ten
    en cuenta lo siguiente:

    - Arquitectura de solo anexado. Se requiere una reconstrucción para reducir
    el almacenamiento.

    - Un poco frágil.

    - Al sincronizar por primera vez, todo el historial será transferido desde
    el remoto. Ten en cuenta los límites de datos y las velocidades lentas.

    - Solo las diferencias se sincronizan en vivo.


    Si encuentras algún problema o tienes ideas sobre esta característica, por
    favor crea un issue en GitHub.

    Aprecio mucho tu gran dedicación.
