Setting:
  GenerateKeyPair:
    Desc: >+
      יצרנו זוג מפתחות!


      הערה: זוג מפתחות זה לא יוצג שוב. אנא שמור אותו במקום בטוח. אם אבד לך, יהיה
      צורך לייצר זוג מפתחות חדש.

      הערה 2: המפתח הציבורי הוא בפורמט spki, והמפתח הפרטי הוא בפורמט pkcs8. לנוחות,
      שורות חדשות ממוירות ל-`\n` במפתח הציבורי.

      הערה 3: יש להגדיר את המפתח הציבורי במסד הנתונים המרוחד, ואת המפתח הפרטי
      במכשירים המקומיים.


      >[!FOR YOUR EYES ONLY]-

      > <div class="sls-keypair">

      >

      > ### מפתח ציבורי

      > ```

      ${public_key}

      > ```

      >

      > ### מפתח פרטי

      > ```

      ${private_key}

      > ```

      >

      > </div>


      >[!Both for copying]-

      >

      > <div class="sls-keypair">

      >

      > ```

      ${public_key}

      ${private_key}

      > ```

      >

      > </div>

    Title: זוג מפתחות חדש נוצר!
  TroubleShooting:
    _value: פתרון בעיות
    Doctor:
      _value: Doctor הגדרות
      Desc: מזהה הגדרות לא אופטימליות. (זהה לפעולה במהלך הגירה)
    ScanBrokenFiles:
      _value: סרוק קבצים פגומים
      Desc: סורק קבצים שלא נשמרו כהלכה במסד הנתונים.
SettingTab:
  Message:
    AskRebuild: השינויים שלך מצריכים משיכה ממסד הנתונים המרוחד. האם להמשיך?
Setup:
  Apply:
    Buttons:
      ApplyAndFetch: החל ומשוך
      ApplyAndMerge: החל ומזג
      ApplyAndRebuild: החל ובנה מחדש
      Cancel: בטל ובטל
      OnlyApply: החל בלבד
    Message: >-
      התצורה החדשה מוכנה. בואו נמשיך להחיל אותה.

      ישנן מספר דרכים להחיל זאת:


      - החל ומשוך
        הגדר מכשיר זה כלקוח חדש. לאחר ההחלה, סנכרן מהשרת המרוחד.
      - החל ומזג
        הגדר על מכשיר שכבר יש בו קבצים. מעבד קבצים מקומיים ומעביר הפרשים. עלולים
        לקום קונפליקטים.
      - החל ובנה מחדש
        בנה את השרת המרוחד מחדש תוך שימוש בקבצים מקומיים. נעשה בדרך כלל אם השרת
        מושחת או אם רוצים להתחיל מאפס. מכשירים אחרים יינעלו ויצטרכו למשוך מחדש.
      - החל בלבד
        החל בלבד. עלולים לקום קונפליקטים אם נדרשת בנייה מחדש.
    Title: החל תצורה חדשה מה-${method}
    WarningRebuildRecommended: "שים לב: לאחר כוונון ההגדרות, נקבע שנדרשת בנייה מחדש;
      ייבוא בלבד אינו מומלץ."
  Doctor:
    Buttons:
      No: לא, אנא השתמש בהגדרות ה-URI כפי שהן
      Yes: כן, אנא יעץ ל-Doctor
    Message: >-
      Self-hosted LiveSync הפך ארוך יותר בהיסטוריה שלו וחלק מההגדרות המומלצות השתנו.


      עכשיו, הגדרה היא זמן מצוין לכך.


      האם ברצונך להפעיל את Doctor כדי לבדוק אם ההגדרות המיובאות אופטימליות
      בהשוואה למצב הנוכחי?
    Title: האם ברצונך להתייעץ עם ה-Doctor?
  FetchRemoteConf:
    Buttons:
      Fetch: כן, אנא משוך את התצורה
      Skip: לא, אנא השתמש בהגדרות ב-URI
    Message: >-
      אם סנכרנו כבר פעם עם מכשיר אחר, מסד הנתונים המרוחד מאחסן ערכי תצורה
      מתאימים בין המכשירים המסונכרנים. הפלאגין ירצה לאחזר אותם לתצורה חזקה יותר.


      עם זאת, עלינו לוודא דבר אחד. האם אנחנו כרגע במצב שבו ניתן לגשת לרשת
      בבטחה ולאחזר את ההגדרות?

      הערה: ברוב המקרים, אתה בטוח לעשות זאת, כל עוד מסד הנתונים המרוחד שלך מאוחסן
      עם תעודת SSL, ורשתך אינה פגומה.
    Title: אחזר תצורה ממסד הנתונים המרוחד?
  QRCode: >-
    יצרנו קוד QR להעברת ההגדרות. אנא סרוק את קוד ה-QR עם הטלפון או מכשיר אחר.

    הערה: קוד ה-QR אינו מוצפן, אז היה זהיר בפתיחתו.


    >[!FOR YOUR EYES ONLY]-

    > <div class="sls-qr">${qr_image}</div>
  ShowQRCode:
    _value: הצג קוד QR
    Desc: הצג קוד QR להעברת ההגדרות.
