  NoKnownPeers: לא זוהו עמיתים, ממתין לעמיתים נכנסים...
  Note:
    description: >2-
       רפליקטור זה מאפשר לסנכרן את הכספת עם מכשירים אחרים באמצעות חיבור עמית-לעמית.
      ניתן להשתמש בזה לסנכרון הכספת עם מכשירים אחרים ללא שירות ענן.

      רפליקטור זה מבוסס על Trystero. הוא משתמש גם בשרת אותות לביסוס חיבור בין מכשירים.
      שרת האותות משמש להחלפת מידע חיבור בין מכשירים. הוא אינו (ולא אמור) לדעת או
      לאחסן את הנתונים שלנו.


      שרת האותות יכול להיות מאוחסן על ידי כל אחד. זהו ממסר Nostr בלבד.
      לצורך פשטות ובדיקת התנהגות הרפליקטור, vrtmrz מאחסן עותק של שרת האותות.
      ניתן להשתמש בשרת הניסיוני של vrtmrz, או בכל שרת אחר.


      אגב, גם אם שרת האותות אינו מאחסן נתונים, הוא יכול לראות מידע חיבור של חלק
      ממכשיריך. אנא שים לב לכך. כמו כן, היה זהיר בשימוש בשרת של מישהו אחר.
