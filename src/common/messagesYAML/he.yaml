Replicator:
  Dialogue:
    Locked:
      Action:
        Dismiss: ביטול לאישור מחדש
        Fetch: אפס סנכרון במכשיר זה
        Unlock: בטל נעילת מסד הנתונים המרוחד
      Message:
        _value: >
          מסד הנתונים המרוחד נעול. הסיבה היא בנייה מחדש באחד הטרמינלים.

          לכן המכשיר מתבקש להמנע מחיבור כדי למנוע פגיעה במסד הנתונים.


          קיימות שלוש אפשרויות:


          - %{Replicator.Dialogue.Locked.Action.Fetch}
            הדרך המועדפת והאמינה ביותר. פעולה זו תמחק את מסד הנתונים המקומי פעם,
            ותאפס את כל מידע הסנכרון ממסד הנתונים המרוחד מחדש. ברוב המקרים ניתן
            לעשות זאת בבטחה. עם זאת, דורשת זמן ויש לבצע ברשת יציבה.
          - %{Replicator.Dialogue.Locked.Action.Unlock}
            ניתן להשתמש בשיטה זו רק אם כבר מסונכרנים באופן אמין בשיטות שכפול
            אחרות. פשוט לא מספיק שיש אותם קבצים. אם אינך בטוח, הימנע מכך.
          - %{Replicator.Dialogue.Locked.Action.Dismiss}
              פעולה זו תבטל את הפעולה. תתבקש שוב בבקשה הבאה.
        Fetch: משיכה מלאה תוזמנה. הפלאגין יופעל מחדש לביצועה.
