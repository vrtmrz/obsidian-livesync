  msgObjectStorageWarning: >-
    אזהרה: תכונה זו בשלב פיתוח, לכן שים לב לנקודות הבאות:

    - ארכיטקטורת הוספה בלבד. נדרשת בנייה מחדש לצמצום האחסון.

    - קצת רגיש.

    - בסנכרון הראשון, כל ההיסטוריה תועבר מהשרת המרוחד. שים לב למגבלות נתונים ומהירות.

    - רק הפרשים מסונכרנים בזמן אמת.


    אם נתקלת בבעיות, או שיש לך רעיונות לגבי תכונה זו, אנא פתח Issue ב-GitHub.

    אנחנו מעריכים את ההקדשה הגדולה שלך.
