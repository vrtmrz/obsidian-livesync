RedFlag:
  Fetch:
    Method:
      Desc: >-
        כיצד ברצונך למשוך?

        - %{RedFlag.Fetch.Method.FetchSafer}.
          **תעבורה נמוכה**, **מעבד גבוה**, **סיכון נמוך**
          מומלץ אם...
          - קבצים עשויים להיות לא עקביים
          - אין הרבה קבצים
        - %{RedFlag.Fetch.Method.FetchSmoother}.
          **תעבורה נמוכה**, **מעבד בינוני**, **סיכון נמוך עד בינוני**
          מומלץ אם...
          - הקבצים ככל הנראה עקביים
          - יש לך הרבה קבצים.
        - %{RedFlag.Fetch.Method.FetchTraditional}.
          **תעבורה גבוהה**, **מעבד נמוך**, **סיכון נמוך עד בינוני**

        >[!INFO]- פרטים

        > ## %{RedFlag.Fetch.Method.FetchSafer}.

        > **תעבורה נמוכה**, **מעבד גבוה**, **סיכון נמוך**

        > אפשרות זו יוצרת תחילה מסד נתונים מקומי תוך שימוש בקבצים מקומיים קיימים
        לפני משיכת נתונים מהמקור המרוחד.

        > אם קיימים קבצים תואמים גם מקומית וגם מרחוק, רק ההפרשים ביניהם יועברו.

        > עם זאת, קבצים הקיימים בשני המקומות יטופלו תחילה כקבצים מתנגשים. הם ייפתרו
        אוטומטית אם לא מתנגשים בפועל, אך תהליך זה עשוי לקחת זמן.

        > זוהי בדרך כלל השיטה הבטוחה ביותר, ממזערת סיכון לאובדן נתונים.

        > ## %{RedFlag.Fetch.Method.FetchSmoother}.

        > **תעבורה נמוכה**, **מעבד בינוני**, **סיכון נמוך עד בינוני** (תלוי בפעולה)

        > אפשרות זו יוצרת תחילה נתחים מקבצים מקומיים למסד הנתונים, ואז מושכת נתונים.
        כתוצאה מכך, רק נתחים חסרים מקומית מועברים. עם זאת, כל המטה-נתונים נלקחים
        מהמקור המרוחד.

        > קבצים מקומיים נבדקים לאחר מכן מול מטה-נתונים אלה בעת ההפעלה. התוכן שנחשב
        חדש יותר ידרוס את הישן יותר (לפי זמן שינוי).

        > בדרך כלל בטוח אם הקבצים המקומיים הם אכן חדשים ביותר. עם זאת, עלול לגרום
        לבעיות אם לקובץ יש חותמת זמן חדשה יותר אך תוכן ישן יותר (כמו `welcome.md` ראשוני).

        > שיטה זו משתמשת בפחות מעבד ומהירה יותר מ-"%{RedFlag.Fetch.Method.FetchSafer}",
        אך עלולה להוביל לאובדן נתונים אם לא משתמשים בה בזהירות.

        > ## %{RedFlag.Fetch.Method.FetchTraditional}.

        > **תעבורה גבוהה**, **מעבד נמוך**, **סיכון נמוך עד בינוני** (תלוי בפעולה)

        > הכל יימשך מהשרת המרוחד.

        > דומה ל-%{RedFlag.Fetch.Method.FetchSmoother}, אך כל הנתחים נמשכים מהמקור המרוחד.

        > זוהי הדרך המסורתית ביותר למשיכה, צורכת בדרך כלל את רוב תעבורת הרשת והזמן.

        > עם זאת, היא נחשבת לעתים קרובות לשיטה היציבה ביותר מכיוון שהיא הוותיקה
        והישירה ביותר.
      FetchSafer: צור מסד נתונים מקומי לפני המשיכה
      FetchSmoother: צור נתחי קבצים מקומיים לפני המשיכה
      FetchTraditional: משוך הכל מהשרת המרוחד
      Title: כיצד ברצונך למשוך?
