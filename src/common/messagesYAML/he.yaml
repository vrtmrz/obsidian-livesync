TweakMismatchResolve:
  Action:
    Dismiss: דחה
    UseConfigured: השתמש בהגדרות המוגדרות
    UseMine: עדכן הגדרות מסד הנתונים המרוחד
    UseMineAcceptIncompatible: עדכן הגדרות מסד הנתונים המרוחד אך השאר כפי שהוא
    UseMineWithRebuild: עדכן הגדרות מסד הנתונים המרוחד ובנה מחדש
    UseRemote: החל הגדרות על מכשיר זה
    UseRemoteAcceptIncompatible: החל הגדרות על מכשיר זה, אך התעלם מאי-תאימות
    UseRemoteWithRebuild: החל הגדרות על מכשיר זה ומשוך שוב
  Message:
    Main: >-

      ההגדרות במסד הנתונים המרוחד הן כדלקמן. ערכים אלה הוגדרו על ידי מכשירים אחרים,
      אשר סונכרנו עם מכשיר זה לפחות פעם אחת.


      אם ברצונך להשתמש בהגדרות אלה, אנא בחר
      %{TweakMismatchResolve.Action.UseConfigured}.

      אם ברצונך לשמור את הגדרות מכשיר זה, אנא בחר
      %{TweakMismatchResolve.Action.Dismiss}.


      ${table}


      >[!TIP]

      > אם ברצונך לסנכרן את כל ההגדרות, אנא השתמש ב-`סנכרון הגדרות דרך Markdown`
      לאחר החלת תצורה מינימלית עם תכונה זו.


      ${additionalMessage}
    MainTweakResolving: |-
      התצורה שלך אינה תואמת לזו שבשרת המרוחד.

      יש להתאים את התצורות הבאות:

      ${table}

      אנא הודע לנו על החלטתך.

      ${additionalMessage}
    UseRemote:
      WarningRebuildRecommended: >-

        >[!NOTICE]

        > חלק מהשינויים תואמים אך עלולים לצרוך אחסון ותעבורה נוספים. מומלצת בנייה
        מחדש. עם זאת, ייתכן שבנייה מחדש לא תתבצע כעת, אך תיושם בתחזוקה עתידית.

        > ***ודא שיש לך זמן ושאתה מחובר לרשת יציבה לפני ההחלה!***
      WarningRebuildRequired: >-

        >[!WARNING]

        > חלק מהתצורות המרוחקות אינן תואמות למסד הנתונים המקומי של מכשיר זה. נדרשת
        בנייה מחדש של מסד הנתונים המקומי.

        > ***ודא שיש לך זמן ושאתה מחובר לרשת יציבה לפני ההחלה!***
    WarningIncompatibleRebuildRecommended: >-

      >[!NOTICE]

      > זיהינו שחלק מהערכים שונים, מה שגורם לאי-תאימות בין מסד הנתונים המקומי למרוחד.

      > חלק מהשינויים תואמים אך עלולים לצרוך אחסון ותעבורה נוספים. מומלצת בנייה מחדש.
      עם זאת, ייתכן שבנייה מחדש לא תתבצע כעת, אך תיושם בתחזוקה עתידית.

      > אם ברצונך לבנות מחדש, הדבר ייקח כמה דקות או יותר. **ודא שבטוח לבצע זאת עכשיו.**
    WarningIncompatibleRebuildRequired: >-

      >[!WARNING]

      > זיהינו שחלק מהערכים שונים, מה שגורם לאי-תאימות בין מסד הנתונים המקומי למרוחד.

      > נדרשת בנייה מחדש של המסד המקומי או המרוחד. שניהם ייקחו כמה דקות או יותר.
      **ודא שבטוח לבצע זאת עכשיו.**
