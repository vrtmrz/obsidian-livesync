  docUri: https://github.com/vrtmrz/obsidian-livesync/blob/main/README.md#how-to-use
  fix0256:
    buttons:
      checkItLater: בדוק מאוחר יותר
      DismissForever: תיקנתי, ואל תשאל שוב
      fix: תקן
    message: >
      בשל באג אחרון (בגרסה 0.25.6), ייתכן שחלק מהקבצים לא נשמרו
      כהלכה במסד הנתונים לסנכרון.

      סרקנו את הקבצים ומצאנו כאלה שיש לתקן.


      **קבצים מוכנים לתיקון:**


      ${files}


      לקבצים אלה יש קובץ מקורי תואם גודל באחסון, וסביר שניתן לשחזרם.

      ניתן להשתמש בהם לתיקון מסד הנתונים. לחץ על כפתור "תקן" למטה לתיקון.


      ${messageUnrecoverable}


      אם ברצונך להריץ שוב, ניתן לעשות זאת מ-Hatch.
    messageUnrecoverable: >
      **קבצים שלא ניתן לתקן במכשיר זה:**


      ${filesNotRecoverable}


      לקבצים אלה יש מטה-נתונים לא עקביים, ולא ניתן לתקנם במכשיר זה
      (לרוב לא ניתן לקבוע מה נכון). לשחזורם, אנא בדוק מכשירים אחרים שלך
      (גם בתכונה זו) או שחזר ידנית מגיבוי.
    title: זוהו קבצים פגומים
  insecureChunkExist:
    buttons:
      fetch: כבר בניתי מחדש את השרת המרוחק. משוך מהשרת המרוחד
      later: אטפל בזה מאוחר יותר
      rebuild: בנה הכל מחדש
    laterMessage: אנו ממליצים בחום לטפל בזה בהקדם האפשרי!
    message: >
      חלק מהנתחים לא מאוחסנים בצורה מאובטחת ואינם מוצפנים במסד הנתונים.

      **אנא בנה מחדש את מסד הנתונים כדי לתקן בעיה זו**.


      אם מסד הנתונים המרוחד אינו מוגדר עם SSL, או משתמש בפרטי גישה פחות מאובטחים,
      **אתה בסיכון של חשיפת מידע רגיש**.


      הערה: אנא שדרג את Self-hosted LiveSync לגרסה 0.25.6 ומעלה על כל מכשיריך,
      וגבה את הכספת שלך.

      הערה 2: בנייה מחדש ומשיכה דורשות זמן ותעבורת רשת. אנא עשה זאת בשעות שיא נמוך
      וודא חיבור רשת יציב.
    title: נמצאו נתחים לא מאובטחים!
