    > - 800: הזהר אם גודל האחסון המרוחד עולה על 800MB.

    >   מומלץ אם אתה משתמש ב-fly.io עם מגבלת 1GB או ב-IBM Cloudant.

    > - 2000: הזהר אם גודל האחסון המרוחד עולה על 2GB.


    אם הגענו למגבלה, תתבקש להרחיב את הסף בהדרגה.
