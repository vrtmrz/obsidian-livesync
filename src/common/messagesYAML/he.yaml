  logSetupCancelled: ההגדרה בוטלה, Self-hosted LiveSync ממתין להגדרתך!
  msgFetchRemoteAgain: >-
    כפי שייתכן שכבר ידוע לך, Self-hosted LiveSync שינה את התנהגות ברירת המחדל ומבנה
    מסד הנתונים.


    ובזכות זמנך ומאמציך, מסד הנתונים המרוחד נראה כבר הוגר. ברכות!


    עם זאת, נדרש עוד קצת. תצורת מכשיר זה אינה תואמת למסד הנתונים המרוחד.
    נצטרך למשוך את מסד הנתונים המרוחד שוב. האם למשוך מהשרת המרוחד עכשיו?


    ___הערה: לא ניתן לסנכרן עד שהתצורה תשתנה ומסד הנתונים יימשך שוב.___

    ___הערה 2: הנתחים הם בלתי-ניתנים לשינוי לחלוטין, ניתן למשוך רק את המטה-נתונים
    וההפרש.___
  msgInitialSetup: >-
    המכשיר שלך **טרם הוגדר**. אנחנו כאן לעזור לך בתהליך ההגדרה.


    שים לב שניתן להעתיק את תוכן כל דיאלוג ללוח. אם צריך לחזור אליו מאוחר יותר,
    ניתן להדביק אותו כפתק ב-Obsidian. ניתן גם לתרגם לשפתך בעזרת כלי תרגום.


    ראשית, האם יש לך **Setup URI**?


    הערה: אם אינך יודע מהו, אנא עיין ב[תיעוד](${URI_DOC}).
  msgRecommendSetupUri: >-
    אנו ממליצים בחום לייצר Setup URI ולהשתמש בו.

    אם אין לך ידע בנושא, אנא עיין ב[תיעוד](${URI_DOC}) (מתנצלים שוב, אך זה חשוב).


    כיצד ברצונך להגדיר ידנית?
  msgSinceV02321: >-
    מאז גרסה 0.23.21, Self-hosted LiveSync שינה את התנהגות ברירת המחדל ומבנה מסד
    הנתונים. השינויים הבאים בוצעו:


    1. **תלות רישיות בשמות קבצים**
       הטיפול בשמות קבצים הוא כעת ללא תלות רישיות. זהו שינוי מועיל לרוב הפלטפורמות,
       פרט ל-Linux ו-iOS שאינן מנהלות תלות רישיות בקבצים ביעילות.
       (בפלטפורמות אלה, תוצג אזהרה עבור קבצים עם אותו שם אך רישיות שונה).

    2. **טיפול בגרסאות של נתחים**
       נתחים הם בלתי-ניתנים לשינוי, מה שמאפשר גרסאות קבועות. שינוי זה ישפר את
       ביצועי שמירת הקבצים.

    ___עם זאת, כדי להפעיל אחד מהשינויים הללו, יש לבנות מחדש גם את מסד הנתונים המרוחד
    וגם את המקומי. תהליך זה לוקח כמה דקות, ואנו ממליצים לעשות זאת כשיש לך זמן פנוי.___


    - אם ברצונך לשמור את ההתנהגות הקודמת, ניתן לדלג על תהליך זה באמצעות `${KEEP}`.

    - אם אין לך מספיק זמן, אנא בחר `${DISMISS}`. תקבל תזכורת בהמשך.

    - אם בנית מחדש את מסד הנתונים במכשיר אחר, אנא בחר `${DISMISS}` ונסה לסנכרן שוב.
    מאחר שזוהה הפרש, תקבל תזכורת שוב.
