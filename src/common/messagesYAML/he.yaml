  msgRebuildRequired: >-
    נדרשת בנייה מחדש של מסדי הנתונים כדי להחיל את השינויים. אנא בחר את השיטה.


    <details>

    <summary>מקרא</summary>


    | סמל | משמעות |

    |: ------ :| ------- |

    | ⇔ | מעודכן |

    | ⇄ | סנכרן לאיזון |

    | ⇐,⇒ | העבר לדריסה |

    | ⇠,⇢ | העבר לדריסה מהצד השני |


    </details>


    ## ${OPTION_REBUILD_BOTH}

    במבט: 📄 ⇒¹ 💻 ⇒² 🛰️ ⇢ⁿ 💻 ⇄ⁿ⁺¹ 📄

    בנה מחדש גם את מסד הנתונים המקומי וגם המרוחד תוך שימוש בקבצים קיימים ממכשיר זה.

    פעולה זו תנעל מכשירים אחרים שיצטרכו לבצע משיכה.

    ## ${OPTION_FETCH}

    במבט: 📄 ⇄² 💻 ⇐¹ 🛰️ ⇔ 💻 ⇔ 📄

    אתחל את מסד הנתונים המקומי ובנה אותו מחדש תוך שימוש בנתונים שנמשכו ממסד הנתונים
    המרוחד.

    כולל את המקרה שבו בנית מחדש את מסד הנתונים המרוחד.

    ## ${OPTION_ONLY_SETTING}

    שמור רק את ההגדרות. **זהירות: עלול לגרום לפגיעה בנתונים**; בנייה מחדש של מסד
    הנתונים נדרשת בדרך כלל.
