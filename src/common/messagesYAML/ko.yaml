    이벤트 감지를 다시 활성화하고 Obsidian을 재시작하시겠습니까?


    > [!DETAILS]-

    > 이러한 설정은 플러그인이 재구성 또는 데이터 가져오기 중에 자동으로 설정한 것입니다. 프로세스가 비정상적으로 종료되면 이 상태가
