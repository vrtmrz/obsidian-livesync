Setup:
  QRCode: |-
    설정을 전송하기 위한 QR 코드를 생성했습니다. 휴대폰이나 다른 기기로 QR 코드를 스캔해 주세요.
    참고: QR 코드는 암호화되지 않았으므로 열 때 주의하세요.

    >[!FOR YOUR EYES ONLY]-
    > <div class="sls-qr">${qr_image}</div>
  ShowQRCode:
    _value: QR 코드 표시
    Desc: 설정을 전송하기 위한 QR 코드를 표시합니다.
  RemoteE2EE:
    Title: 엔드투엔드 암호화
    Guidance: 엔드투엔드 암호화 설정을 구성해 주세요.
    LabelEncrypt: 엔드투엔드 암호화
    PlaceholderPassphrase: 패스프레이즈를 입력하세요
    StronglyRecommendedTitle: 강력 권장
    StronglyRecommendedLine1: 엔드투엔드 암호화를 활성화하면 데이터가 원격 서버로 전송되기 전에 이 기기에서 암호화됩니다. 즉, 누군가 서버에 접근하더라도 패스프레이즈 없이는 데이터를 읽을 수 없습니다. 다른 기기에서 데이터를 복호화할 때도 필요하므로 패스프레이즈를 반드시 기억해 두세요.
    StronglyRecommendedLine2: 또한 Peer-to-Peer 동기화를 사용 중이더라도, 나중에 다른 방식으로 전환하여 원격 서버에 연결하면 이 설정이 그대로 사용됩니다.
    MultiDestinationWarning: 여러 동기화 대상에 연결하는 경우에도 이 설정은 동일해야 합니다.
    LabelObfuscateProperties: 속성 난독화
    ObfuscatePropertiesDesc: >-
      속성(예: 파일 경로, 크기, 생성일 및 수정일)을 난독화하면 원격 서버에서 파일과 폴더의 구조 및 이름을 식별하기 어렵게 만들어 보안을 한층 강화할 수 있습니다. 이는 개인 정보를 보호하고 권한 없는 사용자가 데이터에 관한 정보를 추론하기 어렵게 만듭니다.
    AdvancedTitle: 고급
    LabelEncryptionAlgorithm: 암호화 알고리즘
    DefaultAlgorithmDesc: 대부분의 경우 기본 알고리즘(${algorithm})을 그대로 사용하는 것이 좋습니다. 이 설정은 기존 Vault가 다른 형식으로 암호화되어 있는 경우에만 필요합니다.
    AlgorithmWarning: 암호화 알고리즘을 변경하면 다른 알고리즘으로 암호화된 기존 데이터에 접근할 수 없게 됩니다. 모든 기기에서 동일한 알고리즘을 사용하도록 설정해 데이터 접근성을 유지하세요.
    PassphraseValidationLine1: 엔드투엔드 암호화 패스프레이즈는 실제 동기화가 시작되기 전까지 검증되지 않는다는 점에 유의하세요. 이것은 데이터를 보호하기 위한 보안 조치입니다.
