TweakMismatchResolve:
  Action:
    Dismiss: Отмена
    UseConfigured: Использовать настроенные параметры
    UseMine: Обновить настройки удалённой базы данных
    UseMineAcceptIncompatible: Обновить настройки, но оставить как есть
    UseMineWithRebuild: Обновить настройки и перестроить снова
    UseRemote: Применить настройки к этому устройству
    UseRemoteAcceptIncompatible: Применить настройки, но игнорировать несовместимость
    UseRemoteWithRebuild: Применить настройки и загрузить снова
