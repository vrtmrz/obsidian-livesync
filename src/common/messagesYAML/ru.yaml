    UseRemote:
      WarningRebuildRecommended: Некоторые изменения совместимы, но могут потребовать
        дополнительного хранилища. Рекомендуется перестроение.
      WarningRebuildRequired: Некоторые удалённые конфигурации несовместимы с
        локальной базой данных. Требуется перестроение.
    WarningIncompatibleRebuildRecommended: Обнаружены значения, несовместимые с
      удалённой базой данных. Рекомендуется перестроение.
    WarningIncompatibleRebuildRequired: Обнаружены значения, несовместимые с
      удалённой базой данных. Требуется перестроение.
