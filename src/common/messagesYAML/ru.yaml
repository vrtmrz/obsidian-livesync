  RemoteE2EE:
    Title: Сквозное шифрование
    Guidance: Пожалуйста, настройте параметры сквозного шифрования.
    LabelEncrypt: Сквозное шифрование
    PlaceholderPassphrase: Введите парольную фразу
    StronglyRecommendedTitle: Настоятельно рекомендуется
    StronglyRecommendedLine1: При включении сквозного шифрования ваши данные шифруются на устройстве до отправки на удалённый сервер. Это означает, что даже если кто-то получит доступ к серверу, он не сможет прочитать ваши данные без парольной фразы. Обязательно запомните парольную фразу, так как она потребуется для расшифровки данных на других устройствах.
    StronglyRecommendedLine2: >-
      Также обратите внимание: если вы используете синхронизацию Peer-to-Peer, эта конфигурация будет использована, когда вы позже переключитесь на другие методы и подключитесь к удалённому серверу.
    MultiDestinationWarning: Этот параметр должен быть одинаковым даже при подключении к нескольким направлениям синхронизации.
    LabelObfuscateProperties: Обфусцировать свойства
    ObfuscatePropertiesDesc: Обфускация свойств (например, пути к файлу, размера, дат создания и изменения) добавляет дополнительный уровень защиты, затрудняя определение структуры и названий ваших файлов и папок на удалённом сервере. Это помогает защитить вашу конфиденциальность и усложняет для посторонних вывод информации о ваших данных.
    AdvancedTitle: Дополнительно
    LabelEncryptionAlgorithm: Алгоритм шифрования
    DefaultAlgorithmDesc: В большинстве случаев следует оставить алгоритм по умолчанию (${algorithm}). Этот параметр нужен только в том случае, если у вас уже есть Vault, зашифрованный в другом формате.
    AlgorithmWarning: Изменение алгоритма шифрования лишит доступа к данным, которые ранее были зашифрованы другим алгоритмом. Убедитесь, что все ваши устройства настроены на использование одного и того же алгоритма, чтобы сохранить доступ к данным.
    PassphraseValidationLine1: >-
      Обратите внимание: парольная фраза для сквозного шифрования не проверяется до фактического начала процесса синхронизации. Это сделано в целях безопасности ваших данных.
    PassphraseValidationLine2: Поэтому при ручной настройке информации о сервере требуется предельная осторожность. Если будет введена неверная парольная фраза, данные на сервере будут повреждены. Пожалуйста, учтите, что это ожидаемое поведение.
    ButtonProceed: Продолжить
    ButtonCancel: Отмена
  UseSetupURI:
    Title: Ввести Setup URI
    GuidanceLine1: Введите Setup URI, созданный во время установки сервера или на другом устройстве, а также парольную фразу Vault.
    GuidanceLine2: Новый Setup URI можно создать, выполнив в палитре команд команду «Скопировать настройки как новый Setup URI».
    LabelSetupURI: Setup URI
    ValidInfo: Setup URI корректен и готов к использованию.
    InvalidInfo: Setup URI некорректен. Проверьте его и попробуйте снова.
    LabelPassphrase: Парольная фраза Vault
    PlaceholderPassphrase: Введите парольную фразу Vault
    ErrorPassphraseRequired: Пожалуйста, введите парольную фразу Vault.
    ErrorFailedToParse: Не удалось обработать Setup URI. Проверьте URI и парольную фразу.
    ButtonProceed: Проверить настройки и продолжить
    ButtonCancel: Отмена
  ScanQRCode:
    Title: Сканировать QR-код
    Guidance: Чтобы импортировать настройки с существующего устройства, выполните следующие шаги.
    Step1: На этом устройстве оставьте данный Vault открытым.
    Step2: На исходном устройстве откройте Obsidian.
    Step3: На исходном устройстве в палитре команд выполните команду «Показать настройки как QR-код».
    Step4: На этом устройстве откройте приложение камеры или используйте сканер QR-кодов, чтобы считать показанный QR-код.
    ButtonClose: Закрыть это окно
